name: Publish Community container

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      ref:
        description: Existing release tag to publish, for example v2.1.0
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: alexeylavrentev/leavepilot-community

jobs:
  prepare:
    name: Prepare Community release
    runs-on: ubuntu-24.04

    outputs:
      ref: ${{ steps.release.outputs.ref }}
      version: ${{ steps.release.outputs.version }}
      commit_sha: ${{ steps.verify.outputs.commit_sha }}
      short_sha: ${{ steps.verify.outputs.short_sha }}

    steps:
      - name: Resolve release ref
        id: release
        shell: bash
        env:
          REQUESTED_REF: ${{ inputs.ref }}
          EVENT_NAME: ${{ github.event_name }}
          PUSH_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            release_ref="${REQUESTED_REF}"
          else
            release_ref="${PUSH_REF}"
          fi
          if [[ ! "${release_ref}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release ref must be a semantic version tag such as v2.1.0" >&2
            exit 1
          fi
          echo "ref=${release_ref}" >> "${GITHUB_OUTPUT}"
          echo "version=${release_ref#v}" >> "${GITHUB_OUTPUT}"

      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.release.outputs.ref }}

      - name: Verify package version
        id: verify
        shell: bash
        env:
          EXPECTED_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          actual_version="$(node -p "require('./package.json').version")"
          test "${actual_version}" = "${EXPECTED_VERSION}"
          echo "commit_sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"
          echo "short_sha=$(git rev-parse --short=12 HEAD)" >> "${GITHUB_OUTPUT}"

  build:
    name: Build Community image (${{ matrix.arch }})
    needs: prepare
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push platform image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runtime
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          labels: |
            org.opencontainers.image.title=LeavePilot Community
            org.opencontainers.image.description=Open-source leave management system for teams and growing businesses
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
            org.opencontainers.image.revision=${{ needs.prepare.outputs.commit_sha }}
          cache-from: type=gha,scope=community-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=community-${{ matrix.arch }}

      - name: Smoke-test Community boundary
        if: matrix.arch == 'amd64'
        shell: bash
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          docker pull "${IMAGE}"
          docker run --rm \
            -e SESSION_SECRET=community-release-smoke-session-secret \
            -e CRYPTO_SECRET=community-release-smoke-crypto-secret \
            --entrypoint node "${IMAGE}" -e "
            const fs = require('fs');
            const branding = require('/app/lib/branding').get();
            if (branding.name !== 'LeavePilot') throw new Error('Unexpected branding');
            if (fs.existsSync('/opt/timeoff-premium')) throw new Error('Premium module leaked into Community image');
            console.log('Community image smoke test passed');
          "

      - name: Generate platform SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: leavepilot-community-${{ needs.prepare.outputs.version }}-${{ matrix.arch }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Set up Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign platform image and attest SBOM
        shell: bash
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          DIGEST: ${{ steps.build.outputs.digest }}
          SBOM: leavepilot-community-${{ needs.prepare.outputs.version }}-${{ matrix.arch }}.spdx.json
        run: |
          set -euo pipefail
          cosign sign --yes "${IMAGE}@${DIGEST}"
          cosign attest --yes --type spdxjson --predicate "${SBOM}" "${IMAGE}@${DIGEST}"

      - name: Upload platform SBOM
        uses: actions/upload-artifact@v7
        with:
          name: community-sbom-${{ matrix.arch }}
          path: leavepilot-community-${{ needs.prepare.outputs.version }}-${{ matrix.arch }}.spdx.json
          if-no-files-found: error
          retention-days: 90

      - name: Export image digest
        shell: bash
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/digests"
          touch "${RUNNER_TEMP}/digests/${DIGEST#sha256:}"

      - name: Upload image digest
        uses: actions/upload-artifact@v7
        with:
          name: community-digest-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Publish Community manifest
    needs:
      - prepare
      - build
    runs-on: ubuntu-24.04

    steps:
      - name: Download image digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: community-digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.prepare.outputs.ref }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.prepare.outputs.ref }}
            type=semver,pattern={{major}},value=${{ needs.prepare.outputs.ref }}
            type=raw,value=latest
            type=raw,value=sha-${{ needs.prepare.outputs.short_sha }}
          labels: |
            org.opencontainers.image.title=LeavePilot Community
            org.opencontainers.image.description=Open-source leave management system for teams and growing businesses
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
            org.opencontainers.image.revision=${{ needs.prepare.outputs.commit_sha }}

      - name: Create and push multi-platform manifest
        shell: bash
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          METADATA_JSON: ${{ steps.meta.outputs.json }}
        run: |
          set -euo pipefail
          args=()
          while IFS= read -r tag; do
            args+=(--tag "${tag}")
          done < <(jq -r '.tags[]' <<< "${METADATA_JSON}")
          for digest_file in "${RUNNER_TEMP}"/digests/*; do
            args+=("${IMAGE}@sha256:$(basename "${digest_file}")")
          done
          docker buildx imagetools create \
            "${args[@]}" \
            --annotation "index:org.opencontainers.image.description=LeavePilot Community — open-source leave management system"

      - name: Inspect published image
        run: docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.version }}

      - name: Resolve published manifest digest
        id: published
        shell: bash
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          docker buildx imagetools inspect --raw "${IMAGE}:${VERSION}" > manifest.json
          digest="sha256:$(sha256sum manifest.json | cut -d' ' -f1)"
          echo "digest=${digest}" >> "${GITHUB_OUTPUT}"
          echo "Published manifest: ${IMAGE}@${digest}"

      - name: Set up Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign multi-platform manifest
        shell: bash
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          DIGEST: ${{ steps.published.outputs.digest }}
        run: |
          set -euo pipefail
          cosign sign --yes "${IMAGE}@${DIGEST}"
