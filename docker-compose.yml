services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: timeoff
      MYSQL_USER: timeoff
      MYSQL_PASSWORD: timeoff_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot_password"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DB_DIALECT: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: timeoff
      DB_USER: timeoff
      DB_PASSWORD: timeoff_password
      DB_LOGGING: "false"
      MYSQL_DATABASE: timeoff
      MYSQL_USER: timeoff
      MYSQL_PASSWORD: timeoff_password
    ports:
      - "3000:3000"
    volumes:
      - ./config/app.redis.json:/app/config/app.json:ro

  worker:
    build: .
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_started
    restart: unless-stopped
    environment:
      TIMEOFF_BASE_URL: http://app:3000
      TIMEOFF_TOKEN: ${TIMEOFF_TOKEN}
      JIRA_BASE_URL: ${JIRA_BASE_URL}
      JIRA_USER: ${JIRA_USER}
      JIRA_TOKEN: ${JIRA_TOKEN}
      JIRA_ASSIGN_FIELD: ${JIRA_ASSIGN_FIELD:-name}
      JIRA_EXTRA_JQL: ${JIRA_EXTRA_JQL:-}
      AUTO_MAP_BY_EMAIL: ${AUTO_MAP_BY_EMAIL:-true}
      USER_MAPPING_FILE: /app/integrations/jira-timeoff-worker/config/user-map.json
      TIMEOFF_LEAVE_STATUSES: ${TIMEOFF_LEAVE_STATUSES:-Approved}
      TIMEOFF_DATE: ${TIMEOFF_DATE:-}
      DRY_RUN: ${DRY_RUN:-true}
      MAPPING_REPORT_FILE: ${MAPPING_REPORT_FILE:-/app/integrations/jira-timeoff-worker/reports/mapping-report.json}
      HTTP_TIMEOUT_MS: ${HTTP_TIMEOUT_MS:-20000}
      JIRA_SEARCH_PAGE_SIZE: ${JIRA_SEARCH_PAGE_SIZE:-100}
      WORKER_INTERVAL_SECONDS: ${WORKER_INTERVAL_SECONDS:-600}
    volumes:
      - ./integrations/jira-timeoff-worker/config:/app/integrations/jira-timeoff-worker/config:ro
      - ./integrations/jira-timeoff-worker/reports:/app/integrations/jira-timeoff-worker/reports
    command: >
      sh -c "while true; do
        node /app/integrations/jira-timeoff-worker/index.js;
        sleep $$WORKER_INTERVAL_SECONDS;
      done"

volumes:
  mysql_data:
  redis_data:
