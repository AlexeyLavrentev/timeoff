services:
  db:
    image: mysql:8.0.45
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-timeoff}
      MYSQL_USER: ${MYSQL_USER:-timeoff}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-timeoff_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root_password}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      target: runtime
    init: true
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DB_DIALECT: ${DB_DIALECT:-mysql}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-timeoff}
      DB_USER: ${DB_USER:-timeoff}
      DB_PASSWORD: ${DB_PASSWORD:-timeoff_password}
      DB_LOGGING: ${DB_LOGGING:-false}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-timeoff}
      MYSQL_USER: ${MYSQL_USER:-timeoff}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-timeoff_password}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      CRYPTO_SECRET: ${CRYPTO_SECRET:?CRYPTO_SECRET is required}
      TRUST_PROXY: ${TRUST_PROXY:-1}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      SESSION_COOKIE_SAME_SITE: ${SESSION_COOKIE_SAME_SITE:-lax}
      SESSION_COOKIE_MAX_AGE_MS: ${SESSION_COOKIE_MAX_AGE_MS:-43200000}
      RUN_DB_MIGRATIONS: ${RUN_DB_MIGRATIONS:-true}
      LEAVE_REMINDER_SCHEDULER_ENABLED: ${LEAVE_REMINDER_SCHEDULER_ENABLED:-false}
      LEAVE_REMINDER_SCHEDULER_TIME: ${LEAVE_REMINDER_SCHEDULER_TIME:-09:00}
      LEAVE_REMINDER_SCHEDULER_TIMEZONE: ${LEAVE_REMINDER_SCHEDULER_TIMEZONE:-UTC}
      PRODUCTION_CALENDAR_SCHEDULER_ENABLED: ${PRODUCTION_CALENDAR_SCHEDULER_ENABLED:-false}
      PRODUCTION_CALENDAR_SCHEDULER_TIME: ${PRODUCTION_CALENDAR_SCHEDULER_TIME:-03:00}
      PRODUCTION_CALENDAR_SCHEDULER_TIMEZONE: ${PRODUCTION_CALENDAR_SCHEDULER_TIMEZONE:-UTC}
      TELEGRAM_DIGEST_SCHEDULER_ENABLED: ${TELEGRAM_DIGEST_SCHEDULER_ENABLED:-false}
      TELEGRAM_DIGEST_SCHEDULER_TIME: ${TELEGRAM_DIGEST_SCHEDULER_TIME:-09:00}
      TELEGRAM_DIGEST_SCHEDULER_TIMEZONE: ${TELEGRAM_DIGEST_SCHEDULER_TIMEZONE:-UTC}
      EXTERNAL_CONNECTORS_SCHEDULER_ENABLED: ${EXTERNAL_CONNECTORS_SCHEDULER_ENABLED:-false}
      EXTERNAL_CONNECTORS_SCHEDULER_TIME: ${EXTERNAL_CONNECTORS_SCHEDULER_TIME:-08:00}
      EXTERNAL_CONNECTORS_SCHEDULER_TIMEZONE: ${EXTERNAL_CONNECTORS_SCHEDULER_TIMEZONE:-UTC}
      JIRA_DC_PRIVATE_HOST_ALLOWLIST: ${JIRA_DC_PRIVATE_HOST_ALLOWLIST:-}
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - ./config/app.redis.json:/app/config/app.json:ro
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/', (res) => { process.exit(res.statusCode >= 200 && res.statusCode < 500 ? 0 : 1); }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  mysql_data:
  redis_data:
