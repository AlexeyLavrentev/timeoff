services:
  app:
    build:
      context: .
      target: development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DB_DIALECT: ${DB_DIALECT:-mysql}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-timeoff}
      DB_USER: ${DB_USER:-timeoff}
      DB_PASSWORD: ${DB_PASSWORD:-timeoff_password}
      DB_LOGGING: ${DB_LOGGING:-false}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-timeoff}
      MYSQL_USER: ${MYSQL_USER:-timeoff}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-timeoff_password}
      RUN_DB_MIGRATIONS: ${RUN_DB_MIGRATIONS:-false}
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - ./:/app
      - /app/node_modules
      - ./config/app.redis.json:/app/config/app.json:ro
    command: ["/bin/sh", "./docker/dev-entrypoint.sh"]
