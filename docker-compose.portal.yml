services:
  portal:
    build:
      context: .
      dockerfile: Dockerfile.portal
    init: true
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORTAL_PORT: 3001
      PORTAL_SESSION_SECRET: ${PORTAL_SESSION_SECRET:?PORTAL_SESSION_SECRET is required}
      PORTAL_SESSION_SECURE: ${PORTAL_SESSION_SECURE:-false}
      PORTAL_DB_STORAGE: /app/data/portal.sqlite
      PORTAL_LICENSE_PRIVATE_KEY_FILE: /run/secrets/license_private_key
      PORTAL_LICENSE_PUBLIC_KEY_FILE: /run/secrets/license_public_key
    volumes:
      - portal_data:/app/data
    secrets:
      - license_private_key
      - license_public_key
    ports:
      - "127.0.0.1:${PORTAL_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3001/healthz', (res) => { let d=''; res.on('data',c=>d+=c); res.on('end',()=>{const j=JSON.parse(d); process.exit(j.ok?0:1);}); }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  portal_data:

secrets:
  license_private_key:
    file: ${PORTAL_PRIVATE_KEY_FILE:-./secrets/license_private.pem}
  license_public_key:
    file: ${PORTAL_PUBLIC_KEY_FILE:-./secrets/license_public_key.pem}
